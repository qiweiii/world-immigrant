<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>World Immigrant — Docs</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/github-markdown-css@5.6.1/github-markdown-light.min.css" />
  <script type="module">
    import { marked } from "https://esm.sh/marked@12.0.1";
    import mermaid from "https://cdn.jsdelivr.net/npm/mermaid@10.9.1/dist/mermaid.esm.min.mjs";
    window.marked = marked;
    window.mermaid = mermaid;
    mermaid.initialize({ startOnLoad: false, theme: "default", securityLevel: "strict" });
  </script>
  <style>
    @font-face {
      font-family: "Outfit"; font-style: normal; font-weight: 300 700; font-display: swap;
      src: url(https://cdn.jsdelivr.net/fontsource/fonts/outfit@1/latin-wght-normal.woff2) format("woff2");
    }
    @font-face {
      font-family: "JetBrains Mono"; font-style: normal; font-weight: 400 600; font-display: swap;
      src: url(https://cdn.jsdelivr.net/fontsource/fonts/jetbrains-mono@1/latin-wght-normal.woff2) format("woff2");
    }
    :root {
      --bg: #fafafa; --bg-soft: #ffffff; --panel: #f4f4f5;
      --border: #e4e4e7; --text: #111113; --muted: #71717a;
      --muted-dim: #a1a1aa; --accent: #2563eb; --accent-subtle: rgba(37,99,235,0.06);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh;
      background: var(--bg); color: var(--text);
      font-family: "Outfit", ui-sans-serif, system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    ::selection { background: var(--accent-subtle); }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    .appbar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 50;
      background: color-mix(in srgb, var(--bg) 82%, transparent);
      backdrop-filter: blur(12px); border-bottom: 1px solid var(--border);
    }
    .appbar-inner {
      display: flex; justify-content: space-between;
      align-items: center; max-width: 1200px; margin: 0 auto; height: 56px; padding: 0 24px; gap: 24px;
    }
    .brand { display: inline-flex; align-items: center; gap: 8px; font-weight: 600; font-size: 15px; letter-spacing: -0.03em; }
    .brand-dot { width: 8px; height: 8px; border-radius: 999px; background: var(--accent); }

    .layout {
      display: grid; grid-template-columns: 260px minmax(0, 1fr);
      gap: 24px; max-width: 1200px; margin: 0 auto; padding: 88px 24px 40px;
    }
    aside {
      border-right: 1px solid var(--border); background: var(--bg-soft);
      overflow: auto; max-height: calc(100vh - 88px); position: sticky; top: 88px;
      padding-right: 16px;
    }
    nav { padding: 8px 0; }
    nav ul { list-style: none; margin: 0; padding-left: 8px; }
    nav details { margin-bottom: 2px; }
    nav summary {
      cursor: pointer; padding: 7px 8px; border-radius: 8px;
      color: var(--muted); font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em;
    }
    nav summary:hover { background: var(--panel); }
    nav li a {
      display: block; padding: 6px 10px; border-radius: 6px;
      color: var(--muted); font-size: 13px; text-decoration: none;
      transition: background 0.15s, color 0.15s;
    }
    nav li a:hover, nav li a.active { background: var(--panel); color: var(--text); }
    main { min-width: 0; }
    #content {
      width: 100%; background: var(--bg-soft); border: 1px solid var(--border);
      border-radius: 12px; padding: 32px;
      animation: fade-up 0.4s cubic-bezier(0.16,1,0.3,1) both;
    }
    @keyframes fade-up { from { opacity:0; transform: translateY(12px); } to { opacity:1; transform: translateY(0); } }
    .doc-meta { color: var(--muted-dim); font-size: 12px; font-family: "JetBrains Mono", monospace; margin-bottom: 16px; }
    .mermaid {
      background: var(--panel); border: 1px solid var(--border);
      border-radius: 10px; padding: 16px; margin: 16px 0; text-align: center; overflow-x: auto;
    }
    .placeholder { color: var(--muted); padding: 60px 0; text-align: center; }
    .markdown-body { background: transparent !important; color: var(--text) !important; font-family: "Outfit", sans-serif !important; }
    .markdown-body a { color: var(--accent); }
    .markdown-body h1, .markdown-body h2, .markdown-body h3 { letter-spacing: -0.03em; font-weight: 600; }
    .markdown-body code { font-family: "JetBrains Mono", monospace; font-size: 0.85em; background: var(--panel); padding: 2px 6px; border-radius: 4px; }
    .markdown-body pre { border-radius: 10px; border: 1px solid var(--border); }
    .markdown-body table th, .markdown-body table td { border-color: var(--border); }
    .markdown-body blockquote { border-left: 3px solid var(--accent); color: var(--muted); }
    @media (max-width: 768px) {
      .appbar-inner { padding: 0 16px; }
      .layout { grid-template-columns: 1fr; padding: 72px 16px 32px; }
      aside { display: none; }
      #content { padding: 24px; }
    }
    @media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation-duration: 0.01ms; transition-duration: 0.01ms; } }
  </style>
</head>
<body>
  <header class="appbar">
    <div class="appbar-inner">
      <a class="brand" href="#"><span class="brand-dot"></span> World Immigrant Docs</a>
    </div>
  </header>

  <div class="layout">
    <aside><nav id="nav"></nav></aside>
    <main id="main">
      <div class="placeholder"><p>Loading...</p></div>
    </main>
  </div>

  <script>
    const docs = [
      // Product — vision and strategy first, UX details last
      { path: "product/product-brief.md", title: "Product Brief", type: "markdown", order: 0 },
      { path: "product/product-strategy-public-good.md", title: "Product Strategy", type: "markdown", order: 1 },
      { path: "product/design-system.md", title: "Design System", type: "markdown", order: 2 },
      // Architecture — high-level first, deep dives last
      { path: "architecture/architecture.md", title: "Architecture", type: "markdown", order: 2 },
      { path: "architecture/data-model.md", title: "Data Model", type: "markdown", order: 3 },
      { path: "architecture/technical-approach-deep-dive.md", title: "Technical Approach", type: "markdown", order: 4 },
      // Implementation — plan first, operational details last
      { path: "implementation/implementation-plan.md", title: "Implementation Plan", type: "markdown", order: 5 },
      { path: "implementation/hermes-automation.md", title: "Hermes Automation", type: "markdown", order: 6 },
      { path: "implementation/ux-filter-fields.md", title: "UX Filter Fields", type: "markdown", order: 7 },
      // Research
      { path: "research/competitor-analysis.md", title: "Competitor Analysis", type: "markdown", order: 8 },
      { path: "research/source-and-field-examples.md", title: "Source & Field Examples", type: "markdown", order: 9 },
      // Diagrams
      { path: "diagrams/README.md", title: "Readme", type: "markdown", order: 10 },
      { path: "diagrams/system-architecture.mmd", title: "System Architecture", type: "mermaid", order: 11 },
      { path: "diagrams/data-pipeline.mmd", title: "Data Pipeline", type: "mermaid", order: 12 },
      { path: "diagrams/data-model.mmd", title: "Data Model", type: "mermaid", order: 13 },
      { path: "diagrams/ux-flow.mmd", title: "UX Flow", type: "mermaid", order: 14 },
      { path: "diagrams/filter-reason-engine.mmd", title: "Filter Reason Engine", type: "mermaid", order: 15 }
    ];

    function buildTree(paths) {
      const root = [];
      for (const d of paths) {
        const parts = d.path.split("/"); let list = root, prefix = "";
        for (let i = 0; i < parts.length - 1; i++) {
          const name = parts[i]; prefix = prefix ? prefix + "/" + name : name;
          let f = list.find((x) => x.folder === name);
          if (!f) { f = { folder: name, children: [], order: d.order }; list.push(f); }
          list = f.children;
        }
        list.push(d);
      }
      return root;
    }

    function sortTree(items) {
      items.sort((a, b) => (a.order ?? 0) - (b.order ?? 0));
      for (const item of items) {
        if (item.children) sortTree(item.children);
      }
    }

    function renderTree(items, container) {
      const ul = document.createElement("ul");
      for (const item of items) {
        const li = document.createElement("li");
        if (item.folder) {
          const det = document.createElement("details"); det.open = true;
          const sum = document.createElement("summary"); sum.textContent = item.folder;
          det.appendChild(sum); renderTree(item.children, det); li.appendChild(det);
        } else {
          const a = document.createElement("a");
          a.href = "#" + encodeURIComponent(item.path); a.textContent = item.title; a.dataset.path = "docs/" + item.path;
          li.appendChild(a);
        }
        ul.appendChild(li);
      }
      container.appendChild(ul);
    }

    async function renderMermaid(container) {
      const blocks = container.querySelectorAll(".mermaid");
      for (const b of blocks) {
        const def = b.textContent; b.textContent = "";
        try {
          const id = "m-" + Math.random().toString(36).slice(2);
          const { svg } = await window.mermaid.render(id, def);
          b.innerHTML = svg;
        } catch (err) { b.textContent = "Error: " + err.message; }
      }
    }

    async function loadDoc(path) {
      const main = document.getElementById("main");
      main.innerHTML = '<div class="placeholder"><p>Loading...</p></div>';
      try {
        const res = await fetch(path); const text = await res.text();
        const isMmd = path.endsWith(".mmd");
        const html = isMmd
          ? '<div class="mermaid">' + text.replace(/</g,"&lt;").replace(/>/g,"&gt;") + '</div>'
          : await window.marked.parse(text);
        main.innerHTML = '<div class="doc-meta">' + path + '</div><div id="content" class="markdown-body">' + html + '</div>';
        await renderMermaid(document.getElementById("content"));
      } catch (err) {
        main.innerHTML = '<div class="placeholder"><p>Failed: ' + err.message + '</p></div>';
      }
    }

    const tree = buildTree(docs);
    sortTree(tree);
    const nav = document.getElementById("nav");

    // README link
    const ra = document.createElement("a");
    ra.href = "#README.md"; ra.textContent = "README"; ra.dataset.path = "README.md";
    const rl = document.createElement("li"); rl.appendChild(ra);
    const ru = document.createElement("ul"); ru.appendChild(rl); nav.appendChild(ru);

    renderTree(tree, nav);

    nav.addEventListener("click", (e) => {
      if (e.target.tagName === "A" && e.target.dataset.path) {
        e.preventDefault(); loadDoc(e.target.dataset.path);
        history.pushState(null, "", "#" + encodeURIComponent(e.target.getAttribute("href").slice(1)));
        nav.querySelectorAll("a").forEach((a) => a.classList.remove("active"));
        e.target.classList.add("active");
      }
    });

    const init = location.hash.slice(1);
    if (init) {
      const link = nav.querySelector('a[data-path$="' + decodeURIComponent(init) + '"]');
      if (link) { link.classList.add("active"); loadDoc(link.dataset.path); }
    } else { ra.classList.add("active"); loadDoc("README.md"); }
  </script>
</body>
</html>
